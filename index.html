<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Skill Haystack">
<meta name="theme-color" content="#0f0f0d">
<title>Skill-Haystack</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0d; --surface:#181816; --surface-2:#1e1e1b; --surface-3:#252522;
  --border:rgba(255,255,255,0.07); --border-med:rgba(255,255,255,0.12);
  --text:#e8e6e0; --text-muted:#8a8880; --text-faint:#48463f;
  --primary:#4f98a3; --primary-dim:rgba(79,152,163,0.15); --primary-border:rgba(79,152,163,0.3);
  --pass:#6daa45; --pass-dim:rgba(109,170,69,0.15); --pass-border:rgba(109,170,69,0.3);
  --fail:#dd6974; --fail-dim:rgba(221,105,116,0.15); --fail-border:rgba(221,105,116,0.3);
  --gold:#e8af34; --gold-dim:rgba(232,175,52,0.15); --gold-border:rgba(232,175,52,0.3);
  --purple:#a86fdf; --purple-dim:rgba(168,111,223,0.15); --purple-border:rgba(168,111,223,0.3);
  --blue:#5591c7; --blue-dim:rgba(85,145,199,0.15); --blue-border:rgba(85,145,199,0.3);
  --font:'Satoshi',system-ui,sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
  --r-sm:6px; --r-md:10px; --r-lg:14px; --r-xl:18px; --r-full:999px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg);-webkit-font-smoothing:antialiased;height:100%}
body{
  font-family:var(--font);font-size:16px;color:var(--text);background:var(--bg);
  min-height:100svh;display:flex;flex-direction:column;
  padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);
}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
select,input{font:inherit;color:inherit}
:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:var(--r-sm)}
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  background:color-mix(in oklch,var(--surface) 90%,transparent);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{
  width:32px;height:32px;border-radius:var(--r-md);
  background:var(--primary-dim);border:1px solid var(--primary-border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.logo-name{font-size:15px;font-weight:700;letter-spacing:-0.02em}
.logo-version{
  font-size:11px;color:var(--text-faint);font-weight:500;
  background:var(--surface-3);border:1px solid var(--border);
  border-radius:var(--r-full);padding:1px 7px;margin-left:4px
}
.theme-btn{
  width:36px;height:36px;border-radius:var(--r-md);
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);transition:background 0.15s,color 0.15s;
}
.theme-btn:active{background:var(--surface-3);color:var(--text)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px;display:flex;flex-direction:column;gap:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 0}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-faint)}
.card-body{padding:14px 16px 16px}
.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
.field-label{font-size:12px;color:var(--text-muted);margin-bottom:6px;display:block;font-weight:500}
.select-wrap{position:relative}
.select-wrap::after{
  content:'';position:absolute;right:12px;top:50%;transform:translateY(-50%);
  border:4px solid transparent;border-top-color:var(--text-muted);margin-top:2px;
  pointer-events:none;
}
select{
  width:100%;padding:10px 36px 10px 12px;
  background:var(--surface-2);border:1px solid var(--border-med);
  border-radius:var(--r-md);font-size:14px;
  appearance:none;-webkit-appearance:none;
  transition:border-color 0.15s;
}
select:focus{border-color:var(--primary);outline:none}
.slider-row{display:flex;align-items:center;gap:10px}
.slider-row input[type=range]{
  flex:1;-webkit-appearance:none;appearance:none;
  height:4px;border-radius:var(--r-full);
  background:var(--surface-3);outline:none;
}
.slider-row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;
  border-radius:50%;background:var(--primary);
  box-shadow:0 0 0 3px var(--primary-dim);cursor:pointer;
}
.slider-val{
  font-size:13px;font-weight:700;color:var(--primary);
  min-width:54px;text-align:right;font-variant-numeric:tabular-nums;
}
.zero-tag{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;
  padding:2px 8px;border-radius:var(--r-full);
  background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border);
  margin-left:8px;vertical-align:middle;
}
.skill-info{
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r-md);padding:10px 12px;margin-bottom:14px;
}
.skill-info-name{font-size:13px;font-weight:700;margin-bottom:3px;color:var(--text)}
.skill-info-desc{font-size:12px;color:var(--text-muted);line-height:1.5;margin-bottom:6px}
.skill-info-expected{
  font-family:var(--mono);font-size:11px;color:var(--primary);
  background:var(--primary-dim);border-radius:var(--r-sm);padding:4px 8px;
  word-break:break-all;
}
.multi-skill-banner{
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r-md);padding:10px 12px;margin-bottom:14px;
  font-size:12px;color:var(--text-muted);line-height:1.6;
}
.multi-skill-banner strong{color:var(--gold);font-weight:700}
.multi-sub{font-size:11px;color:var(--text-faint);margin-top:4px}
.skill-check-list{margin-top:8px;display:flex;flex-direction:column;gap:5px}
.skill-check{
  display:flex;align-items:center;gap:8px;font-size:12px;
  background:var(--surface-3);border:1px solid var(--border);
  border-radius:var(--r-md);padding:7px 10px;cursor:pointer;
  transition:border-color 0.15s;
}
.skill-check input[type=checkbox]{accent-color:var(--primary);width:14px;height:14px;cursor:pointer}
.skill-check.checked{border-color:var(--primary-border);background:var(--primary-dim)}
.skill-check-label{flex:1;color:var(--text)}
.skill-check-token{font-family:var(--mono);font-size:10px;color:var(--text-faint)}
.haystack-box{
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r-md);padding:12px;
  font-family:var(--mono);font-size:12px;line-height:1.8;
  color:var(--text-muted);max-height:160px;overflow-y:auto;
  word-break:break-word;-webkit-overflow-scrolling:touch;
}
.haystack-box .trigger{color:var(--primary);font-weight:700;background:var(--primary-dim);border-radius:3px;padding:0 3px}
.haystack-box .decoy{color:var(--gold);background:var(--gold-dim);border-radius:3px;padding:0 3px}
.preview-meta{font-size:11px;color:var(--text-faint);margin-top:8px}
.run-btn{
  width:100%;padding:15px;
  background:var(--primary);color:#fff;
  border-radius:var(--r-lg);font-size:15px;font-weight:700;
  transition:opacity 0.15s,transform 0.1s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.run-btn:active{opacity:0.85;transform:scale(0.98)}
.run-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
/* ── Dual score display ── */
.dual-score-row{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;
}
.score-block{
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:12px 14px;
}
.score-block-label{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.08em;color:var(--text-faint);margin-bottom:6px;
  display:flex;align-items:center;gap:5px;
}
.score-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.score-dot.fidelity{background:var(--pass)}
.score-dot.precision{background:var(--purple)}
.score-pct{
  font-size:26px;font-weight:800;letter-spacing:-0.03em;
  font-variant-numeric:tabular-nums;line-height:1;margin-bottom:6px;
}
.score-pct.fidelity{color:var(--pass)}
.score-pct.fidelity.mid{color:var(--gold)}
.score-pct.fidelity.low{color:var(--fail)}
.score-pct.precision{color:var(--purple)}
.score-pct.precision.mid{color:var(--gold)}
.score-pct.precision.low{color:var(--fail)}
.score-track{height:5px;background:var(--surface-3);border-radius:var(--r-full);overflow:hidden}
.score-fill{height:100%;border-radius:var(--r-full);transition:width 0.4s ease}
.score-fill.fidelity{background:var(--pass)}
.score-fill.fidelity.mid{background:var(--gold)}
.score-fill.fidelity.low{background:var(--fail)}
.score-fill.precision{background:var(--purple)}
.score-fill.precision.mid{background:var(--gold)}
.score-fill.precision.low{background:var(--fail)}
.score-sub{font-size:10px;color:var(--text-faint);margin-top:4px}
/* multi-skill per-skill breakdown */
.multi-breakdown{
  margin-bottom:12px;
}
.multi-breakdown-title{
  font-size:10px;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-faint);
  margin-bottom:6px;font-weight:700;
}
.skill-score-row{
  display:flex;align-items:center;gap:8px;margin-bottom:5px;
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r-md);padding:6px 10px;
}
.skill-score-name{font-size:11px;color:var(--text-muted);flex:1}
.skill-score-bar{flex:2;height:4px;background:var(--surface-3);border-radius:var(--r-full);overflow:hidden}
.skill-score-fill{height:100%;border-radius:var(--r-full);transition:width 0.4s ease}
.skill-score-pct{font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;min-width:36px;text-align:right}
/* legend */
.legend-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.legend-item{
  display:flex;align-items:center;gap:4px;
  font-size:10px;color:var(--text-muted);
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r-full);padding:3px 8px;
}
/* contamination callout */
.contamination-callout{
  background:var(--purple-dim);border:1px solid var(--purple-border);
  border-radius:var(--r-md);padding:10px 12px;margin-bottom:12px;
  font-size:12px;color:var(--text-muted);line-height:1.6;
}
.contamination-callout strong{color:var(--purple);font-weight:700}
.contamination-callout .noise-snippet{
  font-family:var(--mono);font-size:10px;
  background:var(--surface-3);border-radius:3px;padding:1px 5px;
  color:var(--fail);
}
/* stats row */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-pill{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 8px;text-align:center}
.stat-num{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1;margin-bottom:3px}
.stat-label{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em}
.stat-pass .stat-num{color:var(--pass)}
.stat-fail .stat-num{color:var(--fail)}
/* trial dots */
.trial-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.dot{
  width:30px;height:30px;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;font-family:var(--mono);
  border:1px solid transparent;transition:all 0.15s;cursor:pointer;
  position:relative;
}
.dot.pending{background:var(--surface-3);color:var(--text-faint);border-color:var(--border)}
.dot.running{background:var(--primary-dim);color:var(--primary);border-color:var(--primary-border);animation:pulse 0.8s ease-in-out infinite}
.dot.pass-clean{background:var(--pass-dim);color:var(--pass);border-color:var(--pass-border)}
.dot.pass-dirty{
  background:linear-gradient(135deg,var(--pass-dim) 50%,var(--purple-dim) 50%);
  color:var(--pass);border-color:var(--pass-border);
}
.dot.partial{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-border)}
.dot.partial-dirty{
  background:linear-gradient(135deg,var(--gold-dim) 50%,var(--purple-dim) 50%);
  color:var(--gold);border-color:var(--gold-border);
}
.dot.fail{background:var(--fail-dim);color:var(--fail);border-color:var(--fail-border)}
.dot .pip{
  position:absolute;top:2px;right:2px;
  width:5px;height:5px;border-radius:50%;
  background:var(--purple);pointer-events:none;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
/* output log */
.output-log{font-family:var(--mono);font-size:11px;margin-top:12px}
.output-header{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.output-entry{
  display:flex;gap:6px;padding:6px 0;
  border-bottom:1px solid var(--border);align-items:flex-start;
  flex-wrap:wrap;
}
.output-entry:last-child{border-bottom:none}
.out-trial{color:var(--text-faint);min-width:28px;flex-shrink:0}
.out-scores{display:flex;gap:4px;flex-shrink:0}
.out-score{font-weight:700;font-size:11px;min-width:34px}
.out-score.fid.full{color:var(--pass)}
.out-score.fid.partial{color:var(--gold)}
.out-score.fid.zero{color:var(--fail)}
.out-score.prec.full{color:var(--purple)}
.out-score.prec.dirty{color:var(--gold)}
.out-score.prec.zero{color:var(--fail)}
.out-text{color:var(--text-muted);word-break:break-all;line-height:1.4;width:100%;padding-top:2px}
.out-text .clean-part{color:var(--pass)}
.out-text .dirty-part{color:var(--fail);text-decoration:underline wavy var(--fail)}
.out-text.err{color:var(--fail);font-size:10px}
/* export buttons */
.export-row{
  display:flex;gap:6px;margin-top:14px;flex-wrap:wrap;
}
.export-row .export-btn{
  flex:1;min-width:90px;
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  padding:9px 10px;border-radius:var(--r-md);
  font-size:12px;font-weight:700;cursor:pointer;transition:opacity 0.15s;
  border:1px solid;
}
.export-btn:hover{opacity:0.8}
.export-btn.csv {background:#1e2d1e;color:var(--pass);border-color:var(--pass-border)}
.export-btn.md  {background:#1e1e2d;color:var(--blue);border-color:var(--blue-border)}
.export-btn.json{background:#2a241a;color:var(--gold);border-color:var(--gold-border)}
/* misc */
.empty{display:flex;flex-direction:column;align-items:center;padding:32px 16px;color:var(--text-faint);text-align:center;gap:10px}
.empty svg{opacity:0.3}
.empty p{font-size:13px;color:var(--text-muted);max-width:26ch}
.provider-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:var(--r-full);
  font-size:11px;font-weight:600;
  background:var(--primary-dim);color:var(--primary);border:1px solid var(--primary-border);
}
.progress-track{height:3px;background:var(--surface-3);border-radius:var(--r-full);overflow:hidden;margin-bottom:14px}
.progress-fill{height:100%;background:var(--primary);border-radius:var(--r-full);transition:width 0.25s ease;width:0}
.api-input{
  width:100%;padding:10px 12px;
  background:var(--surface-2);border:1px solid var(--border-med);
  border-radius:var(--r-md);font-size:13px;font-family:var(--mono);
  transition:border-color 0.15s;
}
.api-input:focus{border-color:var(--primary);outline:none}
.api-input::placeholder{color:var(--text-faint)}
.api-hint{font-size:11px;color:var(--text-faint);margin-top:5px}
.mode-row{display:flex;gap:6px;margin-bottom:14px}
.mode-btn{
  flex:1;padding:8px 4px;border-radius:var(--r-md);font-size:12px;font-weight:600;
  background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);
  transition:all 0.15s;
}
.mode-btn.active{background:var(--primary-dim);border-color:var(--primary-border);color:var(--primary)}
.mode-btn:active{opacity:0.7}
.tab-row{display:flex;gap:6px;margin-bottom:14px}
.tab-btn{
  flex:1;padding:7px 4px;border-radius:var(--r-md);font-size:11px;font-weight:600;
  background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);
  transition:all 0.15s;
}
.tab-btn.active{background:var(--gold-dim);border-color:var(--gold-border);color:var(--gold)}
.tab-btn:active{opacity:0.7}
.run-id-label{font-size:10px;color:var(--text-faint);font-family:var(--mono);margin-top:8px}
[data-theme="light"] {
  --bg:#f7f6f2; --surface:#f9f8f5; --surface-2:#f3f0ec; --surface-3:#e6e4df;
  --border:rgba(0,0,0,0.07); --border-med:rgba(0,0,0,0.12);
  --text:#28251d; --text-muted:#7a7974; --text-faint:#bab9b4;
}
</style>
</head>
<body>
<header class="header">
  <div class="logo">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="3" fill="#4f98a3"/>
        <path d="M3 13 L8 3 L13 13" stroke="#4f98a3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
      </svg>
    </div>
    <span class="logo-name">Skill-Haystack <span class="logo-version">v6</span></span>
  </div>
  <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">
    <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</header>

<div class="scroll">
  <div class="card">
    <div class="card-header"><span class="card-title">Config</span></div>
    <div class="card-body">
      <div class="mode-row">
        <button class="mode-btn active" id="modeSimBtn" onclick="setMode('simulate')">Simulate</button>
        <button class="mode-btn" id="modeLiveBtn" onclick="setMode('live')">Live API</button>
      </div>
      <div class="field">
        <label class="field-label">Haystack Mode</label>
        <div class="tab-row">
          <button class="tab-btn active" id="tabSingle" onclick="setHaystackMode('single')">Single Skill</button>
          <button class="tab-btn" id="tabMulti" onclick="setHaystackMode('multi')">Multi-Skill</button>
        </div>
      </div>

      <!-- SINGLE SKILL -->
      <div id="singleSkillField" class="field">
        <label class="field-label">Skill</label>
        <div class="select-wrap">
          <select id="skillSelect" onchange="onSkillChange()">
            <optgroup label="— Fidelity Skills —">
              <option value="pi">Pi Digits (3.14159265358979)</option>
              <option value="prime">Long Prime ⚠ Degrades Fast</option>
              <option value="mary">Mary Had a Little Lamb</option>
              <option value="nato">NATO Alphabet (A–J)</option>
            </optgroup>
            <optgroup label="— Token Skills (Pass/Fail) —">
              <option value="weather">Weather Lookup</option>
              <option value="translate">Language Translation</option>
              <option value="summarize">Document Summarizer</option>
            </optgroup>
          </select>
        </div>
        <div id="skillInfoBox" class="skill-info" style="margin-top:10px"></div>
      </div>

      <!-- MULTI SKILL -->
      <div id="multiSkillField" class="field" style="display:none">
        <label class="field-label">Skills to test <span style="color:var(--text-faint);font-weight:400">(all are called per trial)</span></label>
        <div class="skill-check-list" id="skillCheckList"></div>
        <div id="multiSkillBanner" style="margin-top:10px"></div>
      </div>

      <div class="field">
        <label class="field-label">
          Noise Words
          <span id="zeroTag" class="zero-tag" style="display:none">BASELINE</span>
        </label>
        <div class="slider-row">
          <input type="range" id="noiseSlider" min="0" max="50" step="1" value="0">
          <span class="slider-val" id="noiseVal">0</span>
        </div>
        <div style="font-size:11px;color:var(--text-faint);margin-top:4px">Drag right to increase noise depth (up to 20 000 words)</div>
      </div>
      <div class="field">
        <label class="field-label">Trials</label>

  if (v <= 20) return 1000 + (v-10)*200;
  if (v <= 35) return 3000 + (v-20)*500;
  return 10500 + (v-35)*650;
}

// ── Noise words ──
const NOISE_WORDS = [
  'the','a','an','and','but','or','in','on','at','to','for','with','by','from','up',
  'about','into','through','before','after','above','below','between','out','over','under',
  'again','then','here','there','when','where','how','all','each','every','both','few','more',
  'most','other','some','than','too','very','just','because','as','until','while','however',
  'therefore','moreover','approximately','specifically','generally','recently','previously',
  'currently','typically','usually','frequently','occasionally','rarely','almost','also',
  'always','never','often','since','still','yet','alpha','beta','delta','node','sync','flow',
  'data','stream','buffer','cache','vector','scalar','parse','render','compile','execute',
  'route','path','query','schema','model','field','value','key','record','cursor','offset',
  'metric','label','tag','measure','sample','average','median','index','range','scope',
  'process','system','output','input','signal','result','window','filter','token','layer',
  'block','chain','stack','heap','loop','branch','depth','width','length','size','count',
  'group','class','type','name','list','map','set','tree','graph','edge','node','leaf',
  'root','base','core','unit','step','phase','cycle','rate','level','state','mode','flag'
];
function rw()  { return NOISE_WORDS[Math.floor(Math.random()*NOISE_WORDS.length)]; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function buildHaystackWords(noiseCount, position, insertions) {
  const words = Array.from({length: noiseCount}, rw);
  const pos = position === 'random' ? ['start','middle','end'][Math.floor(Math.random()*3)] : position;
  if (insertions.length === 1) {
    const idx = pos === 'start' ? 0 : pos === 'end' ? words.length : Math.floor(words.length/2);
    words.splice(idx, 0, insertions[0]);
    return words;
  }
  const spread = Math.floor(noiseCount/(insertions.length+1));
  let offset = 0;
  insertions.forEach((ins,i) => { const idx = spread*(i+1)+offset; words.splice(idx,0,ins); offset++; });
  return words;
}

      return;
    }
    const insertions = skills.map((_,i)=>'__SKILL_'+i+'__');
    const words = buildHaystackWords(noiseCount, pos, insertions);
    document.getElementById('haystackPreview').innerHTML = words.map(w => {
      const idx = insertions.indexOf(w);
      return idx>=0 ? `<span class="trigger">[SKILL: ${esc(skills[idx].name)}]</span>` : esc(w);
    }).join(' ');

  document.getElementById('haystackPreview').innerHTML = words.map(w => w==='__SKILL__' ? `<span class="trigger">[SKILL INSTRUCTION]</span>` : esc(w)).join(' ');

// ── Precision scoring ──
function scorePrecision(output, expected) {
  const trimmed = output.trim(), expNorm = expected.trim();
  if (trimmed === expNorm) return 1.0;
  if (!trimmed) return 0.0;
  if (trimmed.startsWith(expNorm)) {
    const extra = trimmed.length - expNorm.length;
    return Math.max(0, 1 - extra / expNorm.length); // v6 anchored formula
  }
  const overlap = longestCommonPrefix(trimmed, expNorm);
  return overlap > 0 ? (overlap / Math.max(trimmed.length, expNorm.length)) * 0.5 : 0.0;
}
function longestCommonPrefix(a, b) {
  let i = 0; while (i<a.length && i<b.length && a[i]===b[i]) i++; return i;
}
function splitCleanDirty(output, expected) {
  const t = output.trim(), e = expected.trim();
  if (t === e) return { clean:t, dirty:'' };
  if (t.startsWith(e)) return { clean:e, dirty:t.substring(e.length) };
  const ov = longestCommonPrefix(t,e);
  return { clean:t.substring(0,ov), dirty:t.substring(ov) };
}
function fullScore(skill, rawOutput) {
  const content = skill.scoreContent(rawOutput);
  const precision = scorePrecision(rawOutput, skill.expected);
  const split = splitCleanDirty(rawOutput, skill.expected);
  const contaminated = rawOutput.trim() !== skill.expected.trim() && rawOutput.trim().length > 0;
  return { fidelity:content.fidelity, precision, correct:content.correct, total:content.total, contaminated, clean:split.clean, dirty:split.dirty, output:rawOutput, display:rawOutput.trim().substring(0,60)+(rawOutput.trim().length>60?'…':'') };
}

// ── Providers ──
const PROVIDERS = {
  groq_instant:{ url:'https://api.groq.com/openai/v1/chat/completions',      model:'llama-3.1-8b-instant',    compat:'openai' },
  groq_70b:    { url:'https://api.groq.com/openai/v1/chat/completions',      model:'llama-3.3-70b-versatile', compat:'openai' },
  openai:      { url:'https://api.openai.com/v1/chat/completions',            model:'gpt-4o',                  compat:'openai' },
  mistral:     { url:'https://api.mistral.ai/v1/chat/completions',            model:'mistral-small-latest',    compat:'openai' },
  deepseek:    { url:'https://api.deepseek.com/v1/chat/completions',          model:'deepseek-chat',           compat:'openai' },
  anthropic:   { url:'https://api.anthropic.com/v1/messages',                 model:'claude-3-5-sonnet-latest',compat:'anthropic' },
  gemini:      { url:'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent', model:'', compat:'gemini' },

// Build messages for a single skill
function buildMessages(skill, noiseCount) {
  if (noiseCount === 0) return [
    { role:'system', content: skill.system },
    { role:'user',   content: skill.trigger }
  ];
  const words = buildHaystackWords(noiseCount, document.getElementById('positionSelect').value, ['__SKILL__']);
  const doc = words.map(w => w==='__SKILL__' ? skill.system : w).join(' ')+'.';
  return [
    { role:'system', content:'You are a skill router. Read the entire document. Find the embedded skill instruction and execute it exactly. Output only what the skill specifies — no commentary.' },
    { role:'user',   content: doc+'\n\n'+skill.trigger }
  ];
}

// Build messages for multi-skill (all skills in one call)
function buildMultiMessages(skills, noiseCount) {
  if (noiseCount === 0) {
    const combined = skills.map(s=>s.system).join('\n\n');
    const triggers = skills.map(s=>`${s.trigger}`).join('\n');
    return [
      { role:'system', content:`You are a multi-skill executor. Multiple skill instructions follow. Execute ALL of them. For each, output exactly what the skill specifies, separated by "|||"\n\n${combined}` },
      { role:'user',   content:`Execute all skills in order, separated by "|||":\n${triggers}` }
    ];
  }
  const insertions = skills.map((_,i)=>'__SKILL_'+i+'__');
  const words = buildHaystackWords(noiseCount, document.getElementById('positionSelect').value, insertions);
  const doc = words.map(w => {
    const idx = insertions.indexOf(w);
    return idx>=0 ? skills[idx].system : w;
  }).join(' ')+'.';
  const triggers = skills.map(s=>s.trigger).join('\n');
  return [
    { role:'system', content:'You are a multi-skill router. The document contains multiple embedded skill instructions. Find all of them and execute each one. Separate each output with "|||".' },
    { role:'user',   content: doc+'\n\nExecute all skills in order, separated by "|||":\n'+triggers }
  ];
}

async function callLLM_single(skill, noiseCount) {
  const provKey = document.getElementById('providerSelect').value;
  const apiKey  = document.getElementById('apiKey').value.trim();
  const p = PROVIDERS[provKey];
  const messages = buildMessages(skill, noiseCount);
  try {
    let text = '', rawErr = null;
    if (p.compat==='openai') {
      const res = await fetch(p.url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},body:JSON.stringify({model:p.model,messages,max_tokens:400,temperature:0})});
      const d = await res.json();
      if (d.error) rawErr = d.error.message||JSON.stringify(d.error);
      text = d.choices?.[0]?.message?.content?.trim()||'';
    } else if (p.compat==='anthropic') {
      const res = await fetch(p.url,{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:p.model,max_tokens:400,system:messages[0].content,messages:[messages[1]]})});
      const d = await res.json();
      if (d.error) rawErr = d.error.message||JSON.stringify(d.error);
      text = d.content?.[0]?.text?.trim()||'';
    } else if (p.compat==='gemini') {
      const res = await fetch(`${p.url}?key=${apiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({systemInstruction:{parts:[{text:messages[0].content}]},contents:[{parts:[{text:messages[1].content}]}],generationConfig:{maxOutputTokens:400,temperature:0}})})
      const d = await res.json();
      if (d.error) rawErr = d.error.message||JSON.stringify(d.error);
      text = d.candidates?.[0]?.content?.parts?.[0]?.text?.trim()||'';
    }
    if (rawErr) return [{...fullScore(skill,''), isErr:true, display:'API ERR: '+rawErr.substring(0,80)}];
    return [fullScore(skill, text)];
  } catch(e) {
    return [{...fullScore(skill,''), isErr:true, display:'FETCH ERR: '+e.message.substring(0,60)}];
  }
}

async function callLLM_multi(skills, noiseCount) {
  const provKey = document.getElementById('providerSelect').value;
  const apiKey  = document.getElementById('apiKey').value.trim();
  const p = PROVIDERS[provKey];
  const messages = buildMultiMessages(skills, noiseCount);

      const d = await res.json();
      if (d.error) rawErr = d.error.message||JSON.stringify(d.error);
      text = d.choices?.[0]?.message?.content?.trim()||'';
    } else if (p.compat==='anthropic') {
      const res = await fetch(p.url,{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:p.model,max_tokens:600,system:messages[0].content,messages:[messages[1]]})});
      const d = await res.json();
      if (d.error) rawErr = d.error.message||JSON.stringify(d.error);
      text = d.content?.[0]?.text?.trim()||'';
    } else if (p.compat==='gemini') {
      const res = await fetch(`${p.url}?key=${apiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({systemInstruction:{parts:[{text:messages[0].content}]},contents:[{parts:[{text:messages[1].content}]}],generationConfig:{maxOutputTokens:600,temperature:0}})})
      const d = await res.json();
      if (d.error) rawErr = d.error.message||JSON.stringify(d.error);
      text = d.candidates?.[0]?.content?.parts?.[0]?.text?.trim()||'';
    }
    if (rawErr) return skills.map(s=>({...fullScore(s,''),isErr:true,display:'API ERR: '+rawErr.substring(0,60)}));
    // Split response by ||| separator
    const parts = text.split('|||');
    return skills.map((s,i) => fullScore(s, (parts[i]||'').trim()));
  } catch(e) {
    return skills.map(s=>({...fullScore(s,''),isErr:true,display:'FETCH ERR: '+e.message.substring(0,50)}));
  }
}

// ── Simulate — steeper degradation curve ──
// v6: contamination sigmoid is steeper — degradation visible by ~3k words.
// At 20k words: ~80% contamination probability (was ~60%).
async function simulateSingle(skill, noiseCount) {
  await new Promise(r=>setTimeout(r, 40+Math.random()*80));
  const depthFrac = noiseCount === 0 ? 0 : noiseCount / 20000;
  // Steeper sigmoid: passes through (0,0), (3k,0.4), (10k,0.7), (20k,0.85)
  const contaminationProb = noiseCount === 0 ? 0 : Math.min(0.85, 1 / (1 + Math.exp(-8*(depthFrac-0.25))));
  const fidelityPenalty   = noiseCount === 0 ? 0 : Math.min(0.65, depthFrac * 0.9);
  const baseFidelity = Math.max(0.05, 0.97 - fidelityPenalty);
  const raw = Math.random();
  let rawOutput;
  if (raw < baseFidelity) rawOutput = skill.expected;
  else if (raw < baseFidelity + 0.12) rawOutput = skill.expected.substring(0, Math.floor(skill.expected.length*(0.3+Math.random()*0.5)));
  else rawOutput = '';
  if (rawOutput.length > 0 && Math.random() < contaminationProb) {
    rawOutput = rawOutput + ' ' + Array.from({length:2+Math.floor(Math.random()*4)},rw).join(' ');
  }
  return fullScore(skill, rawOutput);
}

async function simulateMulti(skills, noiseCount) {
  await new Promise(r=>setTimeout(r, 60+Math.random()*120));
  return skills.map(s => {
    const depthFrac = noiseCount === 0 ? 0 : noiseCount / 20000;
    const contaminationProb = noiseCount === 0 ? 0 : Math.min(0.85, 1/(1+Math.exp(-8*(depthFrac-0.25))));
    // Multi adds extra difficulty: each extra skill adds penalty
    const multiPenalty = (skills.length - 1) * 0.06;
    const fidelityPenalty = noiseCount === 0 ? 0 : Math.min(0.75, depthFrac*0.9 + multiPenalty);
    const baseFidelity = Math.max(0.05, 0.97 - fidelityPenalty);
    const raw = Math.random();
    let rawOutput;
    if (raw < baseFidelity) rawOutput = s.expected;
    else if (raw < baseFidelity + 0.12) rawOutput = s.expected.substring(0, Math.floor(s.expected.length*(0.3+Math.random()*0.5)));
    else rawOutput = '';
    if (rawOutput.length > 0 && Math.random() < contaminationProb) {
      rawOutput = rawOutput + ' ' + Array.from({length:2+Math.floor(Math.random()*4)},rw).join(' ');
    }
    return fullScore(s, rawOutput);
  });
}

// ── Helpers ──
function fidClass(f)       { return f===1?'full':f>0?'partial':'zero'; }
function precClass(p)      { return p===1?'full':p>0?'dirty':'zero'; }
function fidColorClass(f)  { return f>=0.85?'':f>=0.5?' mid':' low'; }
function precColorClass(p) { return p>=0.85?'':p>=0.5?' mid':' low'; }
function colorForRate(r)   { return r>=0.85?'var(--pass)':r>=0.5?'var(--gold)':'var(--fail)'; }

// ── Export helpers ──
let lastRun = null;
function triggerDownload(filename, content, mime) {
  const blob = new Blob([content],{type:mime});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click(); URL.revokeObjectURL(a.href);
}
function safeFilename(runId, ext) { return `skill-haystack_${runId.replace(/[:.]/g,'-')}.${ext}`; }

function exportCSV() {
  if (!lastRun) return;
  const r = lastRun;
  const metaKeys = ['run_id','scoring_version','mode','provider','skill_ids','noise_words','trials','passes','fails','pass_rate','avg_fidelity','avg_precision','contamination_rate'];
  const metaVals = metaKeys.map(k => { const v=r[k]; return typeof v==='number'?v:`"${String(v).replace(/"/g,'""')}"`; });
  const trialHeader = 'trial,skill_id,fidelity,precision,contaminated';
  const trialRows   = r.trial_log.flatMap(t => t.skills.map(s => `${t.trial},${s.skill_id},${s.fidelity.toFixed(3)},${s.precision.toFixed(3)},${s.contaminated}`));
  const csv = ['# Skill-Haystack Run Summary', metaKeys.join(','), metaVals.join(','), '', '# Trial Log', trialHeader, ...trialRows].join('\n');
  triggerDownload(safeFilename(r.run_id,'csv'), csv, 'text/csv');
}

function exportMD() {
  if (!lastRun) return;
  const r = lastRun;
  const pct = v => `${(v*100).toFixed(1)}%`;
  const ts  = new Date(r.run_id).toLocaleString();
  const trialRows = r.trial_log.map(t => {
    const avg_f = t.skills.reduce((a,s)=>a+s.fidelity,0)/t.skills.length;
    const avg_p = t.skills.reduce((a,s)=>a+s.precision,0)/t.skills.length;
    const icon  = avg_f===1?'✅':avg_f>0?'⚠️':'❌';
    const dirty = t.skills.some(s=>s.contaminated) ? ' 💉' : '';
    return `| ${String(t.trial).padStart(2,'0')} | ${icon}${dirty} | ${pct(avg_f)} | ${pct(avg_p)} |`;
  });
  const skillBreakdown = r.skill_summary ? Object.entries(r.skill_summary).map(([k,v]) =>
    `| ${k} | ${pct(v.avg_fidelity)} | ${pct(v.avg_precision)} |`
  ).join('\n') : '';
  const md = `# Skill-Haystack Run Report\n\n**Run ID:** \`${r.run_id}\`  \n**Timestamp:** ${ts}  \n**Scoring:** v6\n\n---\n\n## Configuration\n\n| Field | Value |\n|---|---|\n| Mode | ${r.mode} |\n| Provider | \`${r.provider}\` |\n| Skills | ${r.skill_ids} |\n| Noise Words | ${r.noise_words.toLocaleString()} |\n| Trials | ${r.trials} |\n\n---\n\n## Results Summary\n\n| Metric | Value |\n|---|---|\n| **Avg Fidelity** | **${pct(r.avg_fidelity)}** |\n| Avg Precision | ${pct(r.avg_precision)} |\n| Contamination Rate | ${pct(r.contamination_rate)} |\n| Passes | ${r.passes}/${r.trials} |\n\n${skillBreakdown ? `## Per-Skill Breakdown\n\n| Skill | Avg Fidelity | Avg Precision |\n|---|---|---|\n${skillBreakdown}\n\n` : ''}---\n\n## Trial Log\n\n| Trial | Result | Fidelity | Precision |\n|---|---|---|---|\n${trialRows.join('\n')}\n\n---\n\n*Generated by [Skill-Haystack](https://github.com/nothinginfinity/Skill-Haystack)*\n`;
  triggerDownload(safeFilename(r.run_id,'md'), md, 'text/markdown');
}

function exportJSON() {
  if (!lastRun) return;
  triggerDownload(safeFilename(lastRun.run_id,'json'), JSON.stringify(lastRun,null,2), 'application/json');
}

// ── Run ──
let running = false;
async function startRun() {
  if (running) return;
  running = true;
  const trials     = parseInt(trialsSlider.value);
  const noiseCount = sliderToNoise(noiseSlider.value);
  const isLive     = mode === 'live';
  const isMulti    = haystackMode === 'multi';
  const skillsToRun = isMulti ? getMultiSkills() : [currentSkill()];
  if (!skillsToRun.length) { alert('Select at least one skill.'); running=false; return; }
  if (isLive && !document.getElementById('apiKey').value.trim()) { alert('Please enter an API key for Live API mode.'); running=false; return; }

  document.getElementById('runBtn').disabled = true;
  const provKey   = document.getElementById('providerSelect').value;
  const badge     = document.getElementById('providerBadge');
  badge.textContent = (isLive ? provKey.toUpperCase().replace('_',' ') : 'SIMULATED') + (isMulti?' · MULTI':'');
  badge.style.display = 'inline-flex';

  const runId = new Date().toISOString();
  let totalFidelity=0, totalPrecision=0, passes=0, partials=0, fails=0, contaminations=0;
  const trialLog = [];
  const skillSums = {};
  skillsToRun.forEach(s => { skillSums[s.name] = {fid:0,prec:0,n:0}; });

  document.getElementById('resultsBody').innerHTML = `
    <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
    <div class="dual-score-row">
      <div class="score-block">
        <div class="score-block-label"><span class="score-dot fidelity"></span>Fidelity</div>
        <div class="score-pct fidelity low" id="fidPct">—</div>
        <div class="score-track"><div class="score-fill fidelity low" id="fidFill" style="width:0"></div></div>
        <div class="score-sub" id="fidSub">Content accuracy</div>
      </div>
      <div class="score-block">
        <div class="score-block-label"><span class="score-dot precision"></span>Precision</div>
        <div class="score-pct precision low" id="precPct">—</div>
        <div class="score-track"><div class="score-fill precision low" id="precFill" style="width:0"></div></div>
        <div class="score-sub" id="precSub">Output cleanliness</div>
      </div>
    </div>
    ${isMulti ? `<div class="multi-breakdown"><div class="multi-breakdown-title">Per-Skill Fidelity</div>${skillsToRun.map(s=>`<div class="skill-score-row" id="sbr_${s.name.replace(/[^a-zA-Z0-9]/g,'_')}"><span class="skill-score-name">${esc(s.name)}</span><div class="skill-score-bar"><div class="skill-score-fill" id="sfill_${s.name.replace(/[^a-zA-Z0-9]/g,'_')}" style="width:0;background:var(--pass)"></div></div><span class="skill-score-pct" id="spct_${s.name.replace(/[^a-zA-Z0-9]/g,'_')}">—</span></div>`).join('')}</div>` : ''}
    <div class="legend-row">
      <span class="legend-item"><span class="score-dot fidelity"></span>Fidelity = correct content</span>
      <span class="legend-item"><span class="score-dot precision"></span>Precision = no noise leaked</span>
    </div>
    <div class="stats-row">
      <div class="stat-pill stat-pass"><div class="stat-num" id="sPass">0</div><div class="stat-label">Full</div></div>
      <div class="stat-pill" style="background:var(--surface-2);border:1px solid var(--border)"><div class="stat-num" id="sPartial" style="color:var(--gold)">0</div><div class="stat-label">Partial</div></div>
      <div class="stat-pill stat-fail"><div class="stat-num" id="sFail">0</div><div class="stat-label">Zero</div></div>
    </div>
    <div id="contaminationCallout" style="display:none"></div>
    <div class="trial-grid" id="dotGrid"></div>
    <div class="output-log" id="outputLog"></div>
    <div class="run-id-label" id="runIdLabel"></div>
    <div class="export-row" id="exportRow" style="display:none">
      <button class="export-btn csv" onclick="exportCSV()">⬇ CSV</button>
      <button class="export-btn md"  onclick="exportMD()">⬇ .md</button>
      <button class="export-btn json" onclick="exportJSON()">⬇ JSON</button>
    </div>`;

  const dotGrid = document.getElementById('dotGrid');
  const dots = [];
  for (let i=0; i<trials; i++) {
    const d=document.createElement('div'); d.className='dot pending';
    d.textContent=String(i+1).padStart(2,'0');
    dotGrid.appendChild(d); dots.push(d);
  }

  for (let i=0; i<trials; i++) {
    dots[i].className='dot running';
    let results;
    if (isLive) {
      results = isMulti ? await callLLM_multi(skillsToRun, noiseCount) : await callLLM_single(skillsToRun[0], noiseCount);
    } else {
      results = isMulti ? await simulateMulti(skillsToRun, noiseCount) : [await simulateSingle(skillsToRun[0], noiseCount)];
    }

    const avgF = results.reduce((a,r)=>a+r.fidelity,0)/results.length;
    const avgP = results.reduce((a,r)=>a+r.precision,0)/results.length;
    const anyDirty = results.some(r=>r.contaminated);

    results.forEach((r,ri) => {
      const sk = skillsToRun[ri];
      skillSums[sk.name].fid  += r.fidelity;
      skillSums[sk.name].prec += r.precision;
      skillSums[sk.name].n++;
      // Update per-skill bars
      const key = sk.name.replace(/[^a-zA-Z0-9]/g,'_');
      const pctEl  = document.getElementById('spct_'+key);
      const fillEl = document.getElementById('sfill_'+key);
      if (pctEl)  { const avg=skillSums[sk.name].fid/skillSums[sk.name].n; pctEl.textContent=Math.round(avg*100)+'%'; pctEl.style.color=colorForRate(avg); }
      if (fillEl) { const avg=skillSums[sk.name].fid/skillSums[sk.name].n; fillEl.style.width=Math.round(avg*100)+'%'; fillEl.style.background=colorForRate(avg); }
    });

    if (avgF===1&&!anyDirty) passes++; else if (avgF>0||anyDirty) partials++; else fails++;
    if (anyDirty) contaminations++;
    totalFidelity  += avgF;
    totalPrecision += avgP;

    let dotCls = avgF===1?(anyDirty?'pass-dirty':'pass-clean'):avgF>0?(anyDirty?'partial-dirty':'partial'):'fail';
    dots[i].className='dot '+dotCls;
    if (anyDirty) { const pip=document.createElement('span');pip.className='pip';dots[i].appendChild(pip); }

    const aFid=totalFidelity/(i+1), aPrec=totalPrecision/(i+1);
    const fPct=Math.round(aFid*100), pPct=Math.round(aPrec*100);
    document.getElementById('fidPct').textContent=fPct+'%';
    document.getElementById('fidPct').className='score-pct fidelity'+fidColorClass(aFid);
    document.getElementById('fidFill').style.width=fPct+'%';
    document.getElementById('fidFill').className='score-fill fidelity'+fidColorClass(aFid);
    document.getElementById('precPct').textContent=pPct+'%';
    document.getElementById('precPct').className='score-pct precision'+precColorClass(aPrec);
    document.getElementById('precFill').style.width=pPct+'%';
    document.getElementById('precFill').className='score-fill precision'+precColorClass(aPrec);
    document.getElementById('sPass').textContent=passes;
    document.getElementById('sPartial').textContent=partials;
    document.getElementById('sFail').textContent=fails;
    document.getElementById('fidSub').textContent=`Avg ${fPct}% · ${i+1}/${trials}`;
    document.getElementById('precSub').textContent=`Avg ${pPct}% · ${contaminations} contaminated`;
    document.getElementById('progFill').style.width=((i+1)/trials*100)+'%';

    trialLog.push({ trial:i+1, avg_fidelity:avgF, avg_precision:avgP, contaminated:anyDirty,
      skills: results.map((r,ri)=>({ skill_id:skillsToRun[ri].name, fidelity:r.fidelity, precision:r.precision, contaminated:r.contaminated, output:r.output.substring(0,120) })) });
  }

  const aFid=totalFidelity/trials, aPrec=totalPrecision/trials;
  const gap=Math.round((aFid-aPrec)*100);

  const callout=document.getElementById('contaminationCallout');
  if (contaminations>0) {
    const ex=trialLog.find(t=>t.contaminated);
    const snippet=ex?.skills?.find(s=>s.contaminated)?.output||'';
    const snipShort=snippet.trim().split(/\s+/).slice(-4).join(' ');
    callout.style.display='block';
    callout.innerHTML=`<div class="contamination-callout"><strong>⚠️ Contamination in ${contaminations}/${trials} trials</strong><br>Correct content present but noise leaked into output — Fidelity–Precision gap: <strong>${gap}pp</strong>.<br>Example trailing noise: <span class="noise-snippet">${esc(snipShort||'…')}</span></div>`;
  } else callout.style.display='none';

  document.getElementById('outputLog').innerHTML=
    `<div class="output-header">Trial Output Log &nbsp;·&nbsp; <span style="color:var(--pass)">F=Fidelity</span> &nbsp;<span style="color:var(--purple)">P=Precision</span></div>`+
    trialLog.map(t=>{
      const r0=t.skills[0];
      const fCls=fidClass(t.avg_fidelity), pCls=precClass(t.avg_precision);
      const sp=splitCleanDirty(r0.output, skillsToRun[0].expected);
      const textHtml=`<span class="out-text"><span class="clean-part">${esc(sp.clean||'')}</span><span class="dirty-part">${esc(sp.dirty||'')}</span></span>`;
      return `<div class="output-entry"><span class="out-trial">#${String(t.trial).padStart(2,'0')}</span><div class="out-scores"><span class="out-score fid ${fCls}">F${Math.round(t.avg_fidelity*100)}%</span><span class="out-score prec ${pCls}">P${Math.round(t.avg_precision*100)}%</span></div>${textHtml}</div>`;
    }).join('');

  // Build skill summary for export
  const skillSummary = {};
  skillsToRun.forEach(s => {
    const d=skillSums[s.name];
    skillSummary[s.name]={avg_fidelity:d.fid/d.n,avg_precision:d.prec/d.n};
  });

  document.getElementById('runIdLabel').textContent=`Run ID: ${runId}`;
  document.getElementById('exportRow').style.display='flex';

  lastRun = {
    run_id:runId, scoring_version:'v6',
    mode: isMulti?'multi':'single',
    provider: isLive?provKey:'simulated',
    skill_ids: skillsToRun.map(s=>s.name).join(', '),
    noise_words: noiseCount,
    trials,
    passes, fails:trials-passes,
    pass_rate: passes/trials,
    avg_fidelity: aFid,
    avg_precision: aPrec,
    contamination_rate: contaminations/trials,
    skill_summary: skillSummary,
    trial_log: trialLog,
  };

  running=false;
  document.getElementById('runBtn').disabled=false;
}

// ── Init ──
buildMultiSkillChecks();
onSkillChange();
document.getElementById('zeroTag').style.display='inline-flex';
document.getElementById('skillSelect').addEventListener('change', onSkillChange);
</script>
