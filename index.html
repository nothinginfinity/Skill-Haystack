<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Skill Haystack">
<meta name="theme-color" content="#0f0f0d">
<title>Skill-Haystack</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0d; --surface:#181816; --surface-2:#1e1e1b; --surface-3:#252522;
  --border:rgba(255,255,255,0.07); --border-med:rgba(255,255,255,0.12);
  --text:#e8e6e0; --text-muted:#8a8880; --text-faint:#48463f;
  --primary:#4f98a3; --primary-dim:rgba(79,152,163,0.15); --primary-border:rgba(79,152,163,0.3);
  --pass:#6daa45; --pass-dim:rgba(109,170,69,0.15); --pass-border:rgba(109,170,69,0.3);
  --fail:#dd6974; --fail-dim:rgba(221,105,116,0.15); --fail-border:rgba(221,105,116,0.3);
  --gold:#e8af34; --gold-dim:rgba(232,175,52,0.15); --gold-border:rgba(232,175,52,0.3);
  --font:'Satoshi',system-ui,sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
  --r-sm:6px; --r-md:10px; --r-lg:14px; --r-xl:18px; --r-full:999px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg);-webkit-font-smoothing:antialiased;height:100%}
body{
  font-family:var(--font);font-size:16px;color:var(--text);background:var(--bg);
  min-height:100svh;display:flex;flex-direction:column;
  padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);
}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
select,input{font:inherit;color:inherit}
:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:var(--r-sm)}

.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  background:color-mix(in oklch,var(--surface) 90%,transparent);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{
  width:32px;height:32px;border-radius:var(--r-md);
  background:var(--primary-dim);border:1px solid var(--primary-border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.logo-name{font-size:15px;font-weight:700;letter-spacing:-0.02em}
.logo-version{font-size:11px;color:var(--text-faint);font-weight:500;
  background:var(--surface-3);border:1px solid var(--border);
  border-radius:var(--r-full);padding:1px 7px;margin-left:4px}
.theme-btn{
  width:36px;height:36px;border-radius:var(--r-md);
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);transition:background 0.15s,color 0.15s;
}
.theme-btn:active{background:var(--surface-3);color:var(--text)}

.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px;display:flex;flex-direction:column;gap:14px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden;}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 0;}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-faint)}
.card-body{padding:14px 16px 16px}

.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
.field-label{font-size:12px;color:var(--text-muted);margin-bottom:6px;display:block;font-weight:500}
.select-wrap{position:relative}
.select-wrap::after{
  content:'';position:absolute;right:12px;top:50%;transform:translateY(-50%);
  border:4px solid transparent;border-top-color:var(--text-muted);margin-top:2px;
  pointer-events:none;
}
select{
  width:100%;padding:10px 36px 10px 12px;
  background:var(--surface-2);border:1px solid var(--border-med);
  border-radius:var(--r-md);font-size:14px;
  appearance:none;-webkit-appearance:none;
  transition:border-color 0.15s;
}
select:focus{border-color:var(--primary);outline:none}

.slider-row{display:flex;align-items:center;gap:10px}
.slider-row input[type=range]{
  flex:1;-webkit-appearance:none;appearance:none;
  height:4px;border-radius:var(--r-full);
  background:var(--surface-3);outline:none;
}
.slider-row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;
  border-radius:50%;background:var(--primary);
  box-shadow:0 0 0 3px var(--primary-dim);cursor:pointer;
}
.slider-val{
  font-size:13px;font-weight:700;color:var(--primary);
  min-width:48px;text-align:right;font-variant-numeric:tabular-nums;
}

/* Zero-noise pill */
.zero-tag{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;
  padding:2px 8px;border-radius:var(--r-full);
  background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border);
  margin-left:8px;vertical-align:middle;
}

/* Skill info banner */
.skill-info{
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r-md);padding:10px 12px;margin-bottom:14px;
}
.skill-info-name{font-size:13px;font-weight:700;margin-bottom:3px;color:var(--text)}
.skill-info-desc{font-size:12px;color:var(--text-muted);line-height:1.5;margin-bottom:6px}
.skill-info-expected{
  font-family:var(--mono);font-size:11px;color:var(--primary);
  background:var(--primary-dim);border-radius:var(--r-sm);padding:4px 8px;
  word-break:break-all;
}

.haystack-box{
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--r-md);padding:12px;
  font-family:var(--mono);font-size:12px;line-height:1.8;
  color:var(--text-muted);max-height:160px;overflow-y:auto;
  word-break:break-word;-webkit-overflow-scrolling:touch;
}
.haystack-box .trigger{color:var(--primary);font-weight:700;background:var(--primary-dim);border-radius:3px;padding:0 3px;}
.preview-meta{font-size:11px;color:var(--text-faint);margin-top:8px}

.run-btn{
  width:100%;padding:15px;
  background:var(--primary);color:#fff;
  border-radius:var(--r-lg);font-size:15px;font-weight:700;
  transition:opacity 0.15s,transform 0.1s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.run-btn:active{opacity:0.85;transform:scale(0.98)}
.run-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}

/* Fidelity bar */
.fidelity-section{margin-bottom:14px}
.fidelity-label{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.fidelity-track{height:8px;background:var(--surface-3);border-radius:var(--r-full);overflow:hidden;margin-bottom:4px}
.fidelity-fill{height:100%;border-radius:var(--r-full);transition:width 0.4s ease;background:var(--pass)}
.fidelity-fill.mid{background:var(--gold)}
.fidelity-fill.low{background:var(--fail)}
.fidelity-row{display:flex;justify-content:space-between;align-items:baseline}
.fidelity-pct{font-size:28px;font-weight:800;letter-spacing:-0.03em;color:var(--pass);font-variant-numeric:tabular-nums}
.fidelity-pct.mid{color:var(--gold)}
.fidelity-pct.low{color:var(--fail)}
.fidelity-sub{font-size:12px;color:var(--text-muted)}

.rate-row{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
.rate-big{font-size:42px;font-weight:800;letter-spacing:-0.03em;line-height:1;color:var(--pass);font-variant-numeric:tabular-nums}
.rate-big.mid{color:var(--gold)}
.rate-big.low{color:var(--fail)}
.rate-label{font-size:13px;color:var(--text-muted)}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-pill{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 8px;text-align:center;}
.stat-num{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1;margin-bottom:3px}
.stat-label{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em}
.stat-pass .stat-num{color:var(--pass)}
.stat-fail .stat-num{color:var(--fail)}
.stat-total .stat-num{color:var(--primary)}

.trial-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.dot{
  width:30px;height:30px;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;font-family:var(--mono);
  border:1px solid transparent;transition:all 0.15s;
  cursor:pointer;position:relative;
}
.dot.pending{background:var(--surface-3);color:var(--text-faint);border-color:var(--border)}
.dot.running{background:var(--primary-dim);color:var(--primary);border-color:var(--primary-border);animation:pulse 0.8s ease-in-out infinite}
.dot.pass{background:var(--pass-dim);color:var(--pass);border-color:var(--pass-border)}
.dot.partial{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-border)}
.dot.fail{background:var(--fail-dim);color:var(--fail);border-color:var(--fail-border)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}

/* Output log */
.output-log{font-family:var(--mono);font-size:11px;margin-top:12px}
.output-header{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.output-entry{
  display:flex;gap:8px;padding:5px 0;
  border-bottom:1px solid var(--border);align-items:flex-start;
}
.output-entry:last-child{border-bottom:none}
.out-trial{color:var(--text-faint);min-width:28px;flex-shrink:0}
.out-score{min-width:36px;flex-shrink:0;font-weight:700}
.out-score.full{color:var(--pass)}
.out-score.partial{color:var(--gold)}
.out-score.zero{color:var(--fail)}
.out-text{color:var(--text-muted);word-break:break-all;line-height:1.4}

.empty{display:flex;flex-direction:column;align-items:center;padding:32px 16px;color:var(--text-faint);text-align:center;gap:10px;}
.empty svg{opacity:0.3}
.empty p{font-size:13px;color:var(--text-muted);max-width:26ch}

.provider-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:var(--r-full);
  font-size:11px;font-weight:600;
  background:var(--primary-dim);color:var(--primary);border:1px solid var(--primary-border);
}

.progress-track{height:3px;background:var(--surface-3);border-radius:var(--r-full);overflow:hidden;margin-bottom:14px}
.progress-fill{height:100%;background:var(--primary);border-radius:var(--r-full);transition:width 0.25s ease;width:0}

.api-input{
  width:100%;padding:10px 12px;
  background:var(--surface-2);border:1px solid var(--border-med);
  border-radius:var(--r-md);font-size:13px;font-family:var(--mono);
  transition:border-color 0.15s;
}
.api-input:focus{border-color:var(--primary);outline:none}
.api-input::placeholder{color:var(--text-faint)}
.api-hint{font-size:11px;color:var(--text-faint);margin-top:5px}

.mode-row{display:flex;gap:6px;margin-bottom:14px}
.mode-btn{
  flex:1;padding:8px 4px;border-radius:var(--r-md);font-size:12px;font-weight:600;
  background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);
  transition:all 0.15s;
}
.mode-btn.active{background:var(--primary-dim);border-color:var(--primary-border);color:var(--primary)}
.mode-btn:active{opacity:0.7}

/* Light mode overrides */
[data-theme="light"] {
  --bg:#f7f6f2; --surface:#f9f8f5; --surface-2:#f3f0ec; --surface-3:#e6e4df;
  --border:rgba(0,0,0,0.07); --border-med:rgba(0,0,0,0.12);
  --text:#28251d; --text-muted:#7a7974; --text-faint:#bab9b4;
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="3" fill="#4f98a3"/>
        <path d="M3 13 L8 3 L13 13" stroke="#4f98a3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
      </svg>
    </div>
    <span class="logo-name">Skill-Haystack <span class="logo-version">v2</span></span>
  </div>
  <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">
    <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</header>

<div class="scroll">

  <div class="card">
    <div class="card-header"><span class="card-title">Config</span></div>
    <div class="card-body">
      <div class="mode-row">
        <button class="mode-btn active" id="modeSimBtn" onclick="setMode('simulate')">Simulate</button>
        <button class="mode-btn" id="modeLiveBtn" onclick="setMode('live')">Live API</button>
      </div>
      <div class="field">
        <label class="field-label">Skill</label>
        <div class="select-wrap">
          <select id="skillSelect" onchange="onSkillChange()">
            <optgroup label="— Benchmark Skills (Fidelity Scored) —">
              <option value="pi">Pi Digits (3.14159265358979)</option>
              <option value="mary">Mary Had a Little Lamb</option>
              <option value="nato">NATO Phonetic Alphabet (A–J)</option>
            </optgroup>
            <optgroup label="— Token Skills (Pass/Fail) —">
              <option value="weather">Weather Lookup</option>
              <option value="translate">Language Translation</option>
              <option value="summarize">Document Summarizer</option>
            </optgroup>
          </select>
        </div>
      </div>
      <div id="skillInfoBox" class="skill-info"></div>
      <div class="field">
        <label class="field-label">
          Noise Words
          <span id="zeroTag" class="zero-tag" style="display:none">BASELINE</span>
        </label>
        <div class="slider-row">
          <input type="range" id="noiseSlider" min="0" max="2000" step="50" value="200">
          <span class="slider-val" id="noiseVal">200</span>
        </div>
      </div>
      <div class="field">
        <label class="field-label">Trials</label>
        <div class="slider-row">
          <input type="range" id="trialsSlider" min="5" max="30" step="5" value="20">
          <span class="slider-val" id="trialsVal">20</span>
        </div>
      </div>
      <div class="field">
        <label class="field-label">Trigger Position</label>
        <div class="select-wrap">
          <select id="positionSelect">
            <option value="random">Random</option>
            <option value="start">Start</option>
            <option value="middle">Middle</option>
            <option value="end">End</option>
          </select>
        </div>
      </div>
      <div id="liveFields" style="display:none">
        <div class="field">
          <label class="field-label">Provider</label>
          <div class="select-wrap">
            <select id="providerSelect">
              <option value="groq">Groq (llama-3.3-70b) — Free tier</option>
              <option value="openai">OpenAI (gpt-4o)</option>
              <option value="anthropic">Anthropic (claude-3-5-sonnet)</option>
              <option value="gemini">Gemini (gemini-2.0-flash)</option>
              <option value="mistral">Mistral (mistral-small)</option>
              <option value="xai">xAI (grok-3)</option>
              <option value="deepseek">DeepSeek (deepseek-chat)</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label class="field-label">API Key</label>
          <input class="api-input" type="password" id="apiKey" placeholder="sk-..." autocomplete="off" autocorrect="off" spellcheck="false">
          <div class="api-hint">Key stored in memory only. Never leaves your device.</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Haystack Preview</span>
      <button onclick="updatePreview()" style="font-size:11px;color:var(--text-muted);background:var(--surface-3);border:1px solid var(--border);border-radius:var(--r-full);padding:3px 10px">↺ Shuffle</button>
    </div>
    <div class="card-body">
      <div class="haystack-box" id="haystackPreview">Tap Shuffle to preview…</div>
      <div class="preview-meta" id="previewMeta"></div>
    </div>
  </div>

  <button class="run-btn" id="runBtn" onclick="startRun()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
    Run Benchmark
  </button>

  <div class="card" id="resultsCard">
    <div class="card-header"><span class="card-title">Results</span><span id="providerBadge" class="provider-badge" style="display:none"></span></div>
    <div class="card-body" id="resultsBody">
      <div class="empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <p>Run the benchmark to see results</p>
      </div>
    </div>
  </div>

</div>

<script>
// ── THEME ──
const root = document.documentElement;
const themeBtn = document.getElementById('themeBtn');
const sunSVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
const moonSVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
let theme = 'dark';
themeBtn.addEventListener('click', () => {
  theme = theme === 'dark' ? 'light' : 'dark';
  root.setAttribute('data-theme', theme);
  themeBtn.innerHTML = theme === 'dark' ? moonSVG : sunSVG;
  document.querySelector('meta[name="theme-color"]').setAttribute('content', theme === 'dark' ? '#0f0f0d' : '#f7f6f2');
});

// ── MODE ──
let mode = 'simulate';
function setMode(m) {
  mode = m;
  document.getElementById('modeSimBtn').classList.toggle('active', m === 'simulate');
  document.getElementById('modeLiveBtn').classList.toggle('active', m === 'live');
  document.getElementById('liveFields').style.display = m === 'live' ? 'block' : 'none';
}

// ── SKILL DEFINITIONS ──
const SKILLS = {
  pi: {
    name: 'Pi Digits',
    type: 'fidelity',
    trigger: 'give me pi digits',
    instruction: 'When you see the phrase "give me pi digits", respond with ONLY this exact string and nothing else: 3.14159265358979',
    expected: '3.14159265358979',
    description: 'Emit the first 15 digits of Pi. Fidelity scored — partial credit for correct digit runs.',
    score: (output) => {
      const expected = '3.14159265358979';
      const clean = output.trim().replace(/[^0-9.]/g, '');
      let correct = 0;
      for (let i = 0; i < Math.min(clean.length, expected.length); i++) {
        if (clean[i] === expected[i]) correct++; else break;
      }
      return { fidelity: correct / expected.length, correct, total: expected.length, display: clean || output.trim() };
    }
  },
  mary: {
    name: 'Mary Had a Little Lamb',
    type: 'fidelity',
    trigger: 'recite lamb poem',
    instruction: 'When you see the phrase "recite lamb poem", respond with ONLY these four lines verbatim:\nMary had a little lamb,\nIts fleece was white as snow,\nAnd everywhere that Mary went,\nThe lamb was sure to go.',
    expected: 'Mary had a little lamb,\nIts fleece was white as snow,\nAnd everywhere that Mary went,\nThe lamb was sure to go.',
    description: 'Recite all 4 lines verbatim. Fidelity scored by line — each line is 25 points.',
    score: (output) => {
      const lines = [
        'Mary had a little lamb,',
        'Its fleece was white as snow,',
        'And everywhere that Mary went,',
        'The lamb was sure to go.'
      ];
      const norm = s => s.toLowerCase().replace(/[^a-z0-9]/g,'');
      const outLines = output.split(/\n/).map(l => l.trim()).filter(Boolean);
      let correct = 0;
      lines.forEach(line => {
        if (outLines.some(ol => norm(ol) === norm(line))) correct++;
      });
      return { fidelity: correct / lines.length, correct, total: lines.length, display: output.trim().substring(0,80) + (output.length > 80 ? '…' : '') };
    }
  },
  nato: {
    name: 'NATO Alphabet (A–J)',
    type: 'fidelity',
    trigger: 'spell it out NATO',
    instruction: 'When you see the phrase "spell it out NATO", respond with ONLY this comma-separated list and nothing else: Alpha, Bravo, Charlie, Delta, Echo, Foxtrot, Golf, Hotel, India, Juliet',
    expected: 'Alpha, Bravo, Charlie, Delta, Echo, Foxtrot, Golf, Hotel, India, Juliet',
    description: 'Emit first 10 NATO words in order. Fidelity scored — each word is 10 points.',
    score: (output) => {
      const words = ['alpha','bravo','charlie','delta','echo','foxtrot','golf','hotel','india','juliet'];
      const norm = s => s.toLowerCase().replace(/[^a-z]/g,' ').trim();
      const normed = norm(output);
      let correct = words.filter(w => normed.includes(w)).length;
      return { fidelity: correct / words.length, correct, total: words.length, display: output.trim().substring(0,60) + (output.length > 60 ? '…' : '') };
    }
  },
  weather: {
    name: 'Weather Lookup',
    type: 'token',
    trigger: 'what\'s the weather',
    instruction: 'When you detect the phrase "what\'s the weather", respond with ONLY this token: BENCH-weather::4821',
    expected: 'BENCH-weather::4821',
    description: 'Emit exact token when weather trigger found. Pass/fail — no partial credit.',
    score: (output) => {
      const pass = output.trim() === 'BENCH-weather::4821';
      return { fidelity: pass ? 1 : 0, correct: pass ? 1 : 0, total: 1, display: output.trim() };
    }
  },
  translate: {
    name: 'Language Translation',
    type: 'token',
    trigger: 'translate this',
    instruction: 'When you detect the phrase "translate this", respond with ONLY this token: BENCH-translate::7193',
    expected: 'BENCH-translate::7193',
    description: 'Emit exact token when translate trigger found. Pass/fail.',
    score: (output) => {
      const pass = output.trim() === 'BENCH-translate::7193';
      return { fidelity: pass ? 1 : 0, correct: pass ? 1 : 0, total: 1, display: output.trim() };
    }
  },
  summarize: {
    name: 'Document Summarizer',
    type: 'token',
    trigger: 'summarize this',
    instruction: 'When you detect the phrase "summarize this", respond with ONLY this token: BENCH-summarize::3047',
    expected: 'BENCH-summarize::3047',
    description: 'Emit exact token when summarize trigger found. Pass/fail.',
    score: (output) => {
      const pass = output.trim() === 'BENCH-summarize::3047';
      return { fidelity: pass ? 1 : 0, correct: pass ? 1 : 0, total: 1, display: output.trim() };
    }
  }
};

function currentSkill() { return SKILLS[document.getElementById('skillSelect').value]; }

function onSkillChange() { updateSkillInfo(); updatePreview(); }

function updateSkillInfo() {
  const s = currentSkill();
  document.getElementById('skillInfoBox').innerHTML = `
    <div class="skill-info-name">${s.name}</div>
    <div class="skill-info-desc">${s.description}</div>
    <div class="skill-info-expected">${s.expected.replace(/\n/g,' · ')}</div>
  `;
}

// ── NOISE ──
const noiseSlider = document.getElementById('noiseSlider');
const noiseVal = document.getElementById('noiseVal');
const trialsSlider = document.getElementById('trialsSlider');
const trialsVal = document.getElementById('trialsVal');

noiseSlider.addEventListener('input', () => {
  const v = parseInt(noiseSlider.value);
  noiseVal.textContent = v === 0 ? '0' : v;
  document.getElementById('zeroTag').style.display = v === 0 ? 'inline-flex' : 'none';
  updatePreview();
});
trialsSlider.addEventListener('input', () => { trialsVal.textContent = trialsSlider.value; });
document.getElementById('skillSelect').addEventListener('change', onSkillChange);
document.getElementById('positionSelect').addEventListener('change', updatePreview);

const NOISE_WORDS = ['the','a','an','and','but','or','in','on','at','to','for','with','by','from','up',
  'about','into','through','before','after','above','below','between','out','over','under',
  'again','then','here','there','when','where','how','all','each','every','both','few','more',
  'most','other','some','than','too','very','just','because','as','until','while','however',
  'therefore','moreover','approximately','specifically','generally','recently','previously',
  'currently','typically','usually','frequently','occasionally','rarely','almost','also',
  'always','never','often','since','still','yet','alpha','beta','delta','node','sync','flow',
  'data','stream','buffer','cache','vector','scalar','parse','render','compile','execute',
  'route','path','query','schema','model','field','value','key','record','cursor','offset',
  'metric','label','tag','measure','sample','average','median','index','range','scope'];

function rw() { return NOISE_WORDS[Math.floor(Math.random() * NOISE_WORDS.length)]; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function buildHaystack(noiseCount, position, trigger) {
  if (noiseCount === 0) return { words: ['__TRIGGER__'], triggerIdx: 0, trigger, position: 'start', isBaseline: true };
  const words = Array.from({length: noiseCount}, rw);
  const pos = position === 'random' ? ['start','middle','end'][Math.floor(Math.random()*3)] : position;
  let idx = pos === 'start' ? 0 : pos === 'end' ? words.length : Math.floor(words.length / 2);
  words.splice(idx, 0, '__TRIGGER__');
  return { words, triggerIdx: idx, trigger, position: pos, isBaseline: false };
}

let lastHaystack = null;
function updatePreview() {
  const n = parseInt(noiseSlider.value);
  const skill = currentSkill();
  const trigger = skill.trigger;
  const h = buildHaystack(n, document.getElementById('positionSelect').value, trigger);
  lastHaystack = h;
  if (n === 0) {
    document.getElementById('haystackPreview').innerHTML = `<span class="trigger">${esc(trigger)}</span>`;
    document.getElementById('previewMeta').textContent = `Zero-noise baseline — trigger only, no haystack`;
  } else {
    const html = h.words.map(w => w === '__TRIGGER__'
      ? `<span class="trigger">${esc(trigger)}</span>`
      : esc(w)).join(' ') + '.';
    document.getElementById('haystackPreview').innerHTML = html;
    document.getElementById('previewMeta').textContent = `${n} noise words · trigger at ~${h.triggerIdx} (${h.position})`;
  }
}

// ── PROVIDERS ──
const PROVIDERS = {
  groq:     { url:'https://api.groq.com/openai/v1/chat/completions',      model:'llama-3.3-70b-versatile', compat:'openai' },
  openai:   { url:'https://api.openai.com/v1/chat/completions',           model:'gpt-4o',                  compat:'openai' },
  mistral:  { url:'https://api.mistral.ai/v1/chat/completions',           model:'mistral-small-latest',    compat:'openai' },
  deepseek: { url:'https://api.deepseek.com/v1/chat/completions',         model:'deepseek-chat',           compat:'openai' },
  xai:      { url:'https://api.x.ai/v1/chat/completions',                 model:'grok-3',                  compat:'openai' },
  anthropic:{ url:'https://api.anthropic.com/v1/messages',                model:'claude-3-5-sonnet-latest',compat:'anthropic' },
  gemini:   { url:'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent', model:'', compat:'gemini' },
};

function buildPrompt(skill, haystackText) {
  const noiseCount = parseInt(noiseSlider.value);
  const systemPart = noiseCount === 0
    ? `You are a skill executor. The following is a skill instruction. Execute it exactly.`
    : `You are a skill router with embedded skill instructions. Read the entire document carefully. Find the skill instruction buried within it and execute it exactly. Do not add any commentary.`;
  return `${systemPart}\n\nDocument:\n${haystackText}`;
}

async function callLLM(haystackText) {
  const skill = currentSkill();
  const prov = document.getElementById('providerSelect').value;
  const apiKey = document.getElementById('apiKey').value.trim();
  const p = PROVIDERS[prov];
  const prompt = buildPrompt(skill, haystackText);
  try {
    let res, text;
    if (p.compat === 'openai') {
      res = await fetch(p.url, {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
        body: JSON.stringify({ model: p.model, messages:[{role:'user',content:prompt}], max_tokens:200, temperature:0 })
      });
      const d = await res.json();
      text = d.choices?.[0]?.message?.content?.trim() || '';
    } else if (p.compat === 'anthropic') {
      res = await fetch(p.url, {
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},
        body: JSON.stringify({ model: p.model, max_tokens:200, messages:[{role:'user',content:prompt}] })
      });
      const d = await res.json();
      text = d.content?.[0]?.text?.trim() || '';
    } else if (p.compat === 'gemini') {
      res = await fetch(`${p.url}?key=${apiKey}`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{maxOutputTokens:200,temperature:0} })
      });
      const d = await res.json();
      text = d.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
    }
    const scored = skill.score(text);
    return { ...scored, output: text };
  } catch(e) {
    return { fidelity: 0, correct: 0, total: 1, display: 'API_ERROR', output: 'API_ERROR' };
  }
}

async function simulateTrial(noiseCount) {
  await new Promise(r => setTimeout(r, 50 + Math.random() * 100));
  const skill = currentSkill();
  // baseline (0 noise) = very high fidelity; degrade as noise increases
  const baseFidelity = noiseCount === 0 ? 0.97 : Math.max(0, 0.92 - (noiseCount / 2000) * 0.75);
  const raw = Math.random();
  if (raw < baseFidelity) {
    // full pass
    return { fidelity: 1, correct: skill.score(skill.expected).total, total: skill.score(skill.expected).total, display: skill.expected.substring(0,40), output: skill.expected };
  } else if (raw < baseFidelity + 0.15) {
    // partial — simulate partial output
    const partialFrac = 0.3 + Math.random() * 0.5;
    const partialLen = Math.floor(skill.expected.length * partialFrac);
    const partial = skill.expected.substring(0, partialLen);
    const scored = skill.score(partial);
    return { ...scored, output: partial };
  } else {
    return { fidelity: 0, correct: 0, total: skill.score(skill.expected).total, display: 'not_found', output: '' };
  }
}

// ── RUN ──
let running = false;
async function startRun() {
  if (running) return;
  running = true;
  const trials = parseInt(trialsSlider.value);
  const noiseCount = parseInt(noiseSlider.value);
  const skill = currentSkill();
  const isLive = mode === 'live';
  if (isLive && !document.getElementById('apiKey').value.trim()) {
    alert('Please enter an API key to use Live API mode.');
    running = false; return;
  }

  document.getElementById('runBtn').disabled = true;
  const badge = document.getElementById('providerBadge');
  badge.textContent = isLive ? document.getElementById('providerSelect').value.toUpperCase() : 'SIMULATED';
  badge.style.display = 'inline-flex';

  // Build haystack once for this run
  const trigger = skill.trigger;
  let haystackText;
  if (noiseCount === 0) {
    haystackText = skill.instruction;
  } else {
    const h = buildHaystack(noiseCount, document.getElementById('positionSelect').value, trigger);
    lastHaystack = h;
    // Replace __TRIGGER__ with the skill instruction embedded inline
    haystackText = h.words.map(w => w === '__TRIGGER__' ? skill.instruction : w).join(' ') + '.';
    document.getElementById('haystackPreview').innerHTML = h.words.map(w =>
      w === '__TRIGGER__' ? `<span class="trigger">${esc(trigger)}</span>` : esc(w)).join(' ') + '.';
    document.getElementById('previewMeta').textContent = `${noiseCount} noise words · trigger at ~${h.triggerIdx} (${h.position})`;
  }

  let totalFidelity = 0;
  let passes = 0, partials = 0, fails = 0;
  const trialResults = [];

  const body = document.getElementById('resultsBody');
  body.innerHTML = `
    <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
    <div class="fidelity-section">
      <div class="fidelity-label">Avg Fidelity</div>
      <div class="fidelity-row">
        <div class="fidelity-pct" id="fidelityPct">—</div>
        <div class="fidelity-sub" id="fidelitySub">running…</div>
      </div>
      <div class="fidelity-track"><div class="fidelity-fill" id="fidelityFill" style="width:0"></div></div>
    </div>
    <div class="stats-row">
      <div class="stat-pill stat-pass"><div class="stat-num" id="sPass">0</div><div class="stat-label">Full</div></div>
      <div class="stat-pill" style="background:var(--surface-2);border:1px solid var(--border)"><div class="stat-num" id="sPartial" style="color:var(--gold)">0</div><div class="stat-label">Partial</div></div>
      <div class="stat-pill stat-fail"><div class="stat-num" id="sFail">0</div><div class="stat-label">Zero</div></div>
    </div>
    <div class="trial-grid" id="dotGrid"></div>
    <div class="output-log" id="outputLog"></div>
  `;

  const dotGrid = document.getElementById('dotGrid');
  const dots = [];
  for (let i = 0; i < trials; i++) {
    const d = document.createElement('div');
    d.className = 'dot pending';
    d.textContent = String(i+1).padStart(2,'0');
    dotGrid.appendChild(d);
    dots.push(d);
  }

  for (let i = 0; i < trials; i++) {
    dots[i].className = 'dot running';
    const result = isLive ? await callLLM(haystackText) : await simulateTrial(noiseCount);
    trialResults.push(result);

    const frac = result.fidelity;
    let dotClass = frac === 1 ? 'pass' : frac > 0 ? 'partial' : 'fail';
    dots[i].className = `dot ${dotClass}`;
    dots[i].title = `${Math.round(frac*100)}%`;

    if (frac === 1) passes++;
    else if (frac > 0) partials++;
    else fails++;

    totalFidelity += frac;
    const avgFid = totalFidelity / (i+1);
    const pct = Math.round(avgFid * 100);
    const fidClass = avgFid >= 0.85 ? '' : avgFid >= 0.5 ? ' mid' : ' low';

    document.getElementById('fidelityPct').textContent = pct + '%';
    document.getElementById('fidelityPct').className = 'fidelity-pct' + fidClass;
    document.getElementById('fidelityFill').style.width = pct + '%';
    document.getElementById('fidelityFill').className = 'fidelity-fill' + fidClass;
    document.getElementById('fidelitySub').textContent = `${passes} full · ${partials} partial · ${fails} zero — ${i+1}/${trials} trials`;
    document.getElementById('sPass').textContent = passes;
    document.getElementById('sPartial').textContent = partials;
    document.getElementById('sFail').textContent = fails;
    document.getElementById('progFill').style.width = ((i+1)/trials*100) + '%';
  }

  // Final fidelity label
  const avgFid = totalFidelity / trials;
  const noiseLbl = noiseCount === 0 ? 'baseline (0 noise)' : `${noiseCount} noise words`;
  document.getElementById('fidelitySub').textContent = `${Math.round(avgFid*100)}% avg · ${noiseLbl} · ${trials} trials`;

  // Output log — show all trials
  const ol = document.getElementById('outputLog');
  ol.innerHTML = '<div class="output-header">Trial Output Log</div>' +
    trialResults.map((r, i) => {
      const scoreClass = r.fidelity === 1 ? 'full' : r.fidelity > 0 ? 'partial' : 'zero';
      const scoreLbl = Math.round(r.fidelity * 100) + '%';
      return `<div class="output-entry">
        <span class="out-trial">#${String(i+1).padStart(2,'0')}</span>
        <span class="out-score ${scoreClass}">${scoreLbl}</span>
        <span class="out-text">${esc(r.display || r.output || 'empty')}</span>
      </div>`;
    }).join('');

  running = false;
  document.getElementById('runBtn').disabled = false;
}

// ── INIT ──
onSkillChange();
</script>
